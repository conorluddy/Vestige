name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Backfill any workspace crate whose local version is ahead of crates.io.
      #
      # release-plz 0.3.x uses the existence of the `vX.Y.Z` git tag as its
      # "already published" signal — not the registry. So if a previous run
      # tagged the workspace and then partially published (network blip,
      # registry rate-limit, sibling crate not yet index-visible), the tag
      # exists but the registry is missing crates. Every subsequent run sees
      # the tag and refuses to retry, jamming the pipeline indefinitely.
      #
      # This step does an actual registry-vs-local check and runs `cargo
      # publish` for any deltas, in workspace dep order. In the happy path
      # it's a fast no-op (just curl + jq per crate). In the broken-state
      # path it backfills the missing publishes so release-plz then sees a
      # consistent state.
      #
      # `cargo publish` blocks until each crate is index-visible before
      # exiting, so sequential calls in dep order handle ordering for free.

      - name: Backfill missing crates.io publishes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Only backfill in the *partial-publish recovery* case.
          #
          # release-plz uses the existence of the `vX.Y.Z` git tag as its
          # "already released" signal. So the only state this backfill must
          # recover from is: tag exists, but the registry is incomplete (a
          # previous run tagged then crashed mid-publish). If there is no
          # tag for the current local version, release-plz hasn't run yet —
          # let it do publish + tag + GitHub Release in a single flow.
          #
          # Without this gate, the backfill fires on every fresh release-PR
          # merge (local always ahead of registry by design), publishes the
          # crates itself, and starves release-plz of anything to release —
          # leaving the version published on crates.io but with no git tag,
          # no GitHub Release, no cargo-dist binaries, and no Homebrew bump.
          local_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "vestige") | .version')
          if ! git rev-parse "v$local_version" >/dev/null 2>&1; then
            echo "No v$local_version tag yet — skipping backfill so release-plz can publish + tag + release."
            exit 0
          fi
          echo "Tag v$local_version exists — checking registry for partial-publish recovery."
          # Workspace dep order — must match the topological order used by
          # release-plz. Update if a new crate is added to the workspace.
          crates=(vestige-core vestige-embed vestige-store vestige-config vestige-engine vestige-mcp vestige)
          for crate in "${crates[@]}"; do
            local_version=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg c "$crate" '.packages[] | select(.name == $c) | .version')
            # crates.io rejects requests without a User-Agent (returns 403).
            registry_version=$(curl -sSf \
              -A "vestige-release-backfill (https://github.com/conorluddy/Vestige)" \
              "https://crates.io/api/v1/crates/$crate" \
              | jq -r '.crate.max_version // ""')
            echo "$crate: local=$local_version registry=$registry_version"
            if [[ -z "$registry_version" ]]; then
              echo "::warning::$crate not on crates.io yet — first publish must come from a release-plz run"
              continue
            fi
            if [[ "$local_version" == "$registry_version" ]]; then
              continue
            fi
            highest=$(printf '%s\n%s\n' "$local_version" "$registry_version" | sort -V | tail -1)
            if [[ "$highest" != "$local_version" ]]; then
              echo "::warning::$crate local ($local_version) is behind registry ($registry_version) — skipping"
              continue
            fi
            echo "::group::Publishing $crate $local_version (registry has $registry_version)"
            cargo publish -p "$crate" --no-verify
            echo "::endgroup::"
          done

      # Split into two steps so the publish phase runs FIRST.
      #
      # The default `release-plz` action runs `release-pr` and `release`
      # together, but `release-pr` errors out if the registry is behind
      # local Cargo.toml versions (e.g. a previous run partially published).
      # That makes a transient publish failure self-perpetuating: once
      # `release-pr` fails, no future run can recover without manual
      # `cargo publish` of the missing crates.
      #
      # Running `release` first makes recovery automatic. It compares each
      # workspace crate's local version against crates.io and publishes
      # any that are ahead — a no-op in the happy path, a self-heal when
      # the registry has fallen behind.

      - name: release-plz release (publish any pending crates)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: release-plz release-pr (open next bump PR)
        id: release-pr
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Arm GitHub native auto-merge on the freshly-opened release PR.
      #
      # release-plz only opens or updates one release PR per branch at a
      # time, so we always pick the first entry. The PR sits open until CI
      # passes (semver-checks, fmt, clippy, tests, package check); auto-merge
      # then squashes it into main without further intervention. The next
      # workflow run on that merge commit triggers the publish chain.
      #
      # `--auto` requires `allow_auto_merge` to be enabled in repo settings;
      # if it's off the gh CLI exits non-zero.

      - name: Enable auto-merge on release PR
        if: steps.release-pr.outputs.prs != '' && steps.release-pr.outputs.prs != '[]'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          set -euo pipefail
          pr_number=$(echo '${{ steps.release-pr.outputs.prs }}' | jq -r '.[0].number // empty')
          if [[ -z "$pr_number" ]]; then
            echo "No release PR to auto-merge."
            exit 0
          fi
          echo "Arming auto-merge on PR #$pr_number"
          gh pr merge --auto --squash --repo "${GITHUB_REPOSITORY}" "$pr_number"
