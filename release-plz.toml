[workspace]
# One tag for the whole workspace, matching the existing v0.1.0 scheme so
# release-tap.yml keeps firing on the same trigger.
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
release_always = false
git_tag_enable = true
# cargo-dist owns the GitHub Release (it builds binaries and attaches them
# in the same job that creates the release). release-plz just pushes the tag;
# the release.yml workflow takes over from the tag.
git_release_enable = false
# Conventional Commits drive the bump; release-plz computes publish order
# from the workspace dep graph.
semver_check = true

# Commit parsing for changelog generation + bump detection.
#
# Conventional Commits semantics: `feat` → minor, `fix`/`perf` → patch,
# everything else (`chore`, `ci`, `docs`, `test`, `refactor`, `style`)
# does not warrant a published version on its own.
#
# `skip = true` excludes the commit from both the changelog and bump
# detection. Without these rules, merging release-plz's own
# `chore: release vX.Y.Z` PR — or any `chore(ci): …` infra tweak — was
# being read as "new work since the last tag" and produced spurious
# vX.Y.(Z+1) PRs.
[changelog]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^style", skip = true },
]
